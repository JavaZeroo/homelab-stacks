version: "3.9"

x-env: &common-env
  PUID: "${PUID:-1000}"
  PGID: "${PGID:-1000}"
  TZ:   "${TZ:-Asia/Shanghai}"

x-restart: &restart { restart: unless-stopped }
x-logging: &logging
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "3" }

services:
  qbittorrent:
    image: linuxserver/qbittorrent:4.6.7-libtorrentv1
    container_name: qbittorrent
    environment:
      <<: *common-env
      WEBUI_PORT: "${QBIT_PORT_UI:-8080}"
      TORRENTING_PORT: "${QBIT_PORT_CONN:-6881}"
    volumes:
      - "${MEDIA_STACK_ROOT:-/data/apps}/media:/media"
      - "${MEDIA_STACK_ROOT:-/data/apps}/media/downloads:/downloads"
      - "${MEDIA_STACK_ROOT:-/data/apps}/qbittorrent/config:/config"
      - "${MEDIA_STACK_ROOT:-/data/apps}/qbittorrent/watch:/watch"
      - "${MEDIA_STACK_ROOT:-/data/apps}/qbittorrent/logs:/logs"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${QBIT_PORT_UI:-8080}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      lan:
        ipv4_address: 192.168.3.44
    dns:
      - 192.168.3.1
    <<: [*restart, *logging]

networks:
  lan:
    driver: macvlan
    driver_opts:
      parent: br0
    ipam:
      config:
        - subnet: 192.168.3.0/24
          gateway: 192.168.3.1
