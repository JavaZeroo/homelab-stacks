# ---- OpenClash central config/rules (oc-host :18088) + Sub-Store (:13003) ----
# Consumed by remote routers (e.g. 192.168.11.1) over public HTTPS.

# base.remote.yaml + rule files + geo lists  (basic-auth protected: embeds secrets)
location /oc/ {
    auth_basic           "oc";
    auth_basic_user_file /etc/nginx/conf.d/.htpasswd;
    proxy_pass           http://127.0.0.1:18088/;
    proxy_set_header     Host $host;
    proxy_read_timeout   60s;
}

# Sub-Store download API (path itself is the secret; mirrors LAN :13003 behavior)
location /Ku91677Gk7fHKlMQagFl/ {
    proxy_pass           http://127.0.0.1:13003/Ku91677Gk7fHKlMQagFl/;
    proxy_set_header     Host $host;
    proxy_set_header     X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout   120s;
    client_max_body_size 50m;
}
