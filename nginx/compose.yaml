x-env: &common-env
  TZ: "${TZ:-Asia/Shanghai}"

x-restart: &restart { restart: unless-stopped }
x-logging: &logging
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "3" }

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    environment: *common-env
    command: ["/bin/sh", "-c", "nginx -t && exec nginx -g 'daemon off;' "]
    network_mode: host
    volumes:
      - "./config/conf.d/:/etc/nginx/conf.d/:ro"
      - "/data/certs:/root/certs:ro"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    <<: [*restart, *logging]
