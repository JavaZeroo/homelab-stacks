x-env: &common-env
  PUID: "${PUID:-0}"
  PGID: "${PGID:-0}"
  TZ:   "${TZ:-Asia/Shanghai}"

x-restart: &restart { restart: unless-stopped }
x-logging: &logging
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "3" }

services:
  yourapp:
    image: your/image:latest
    container_name: yourapp
    environment: *common-env
    volumes:
      - "/data/apps/yourapp/config:/config"
      - "/data/apps/yourapp/data:/data"
    ports:
      - "${YOURAPP_PORT:-12345}:12345"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:12345/health"]
      interval: 30s
      timeout: 5s
      retries: 5
    <<: [*restart, *logging]
