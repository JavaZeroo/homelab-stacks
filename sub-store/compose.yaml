x-restart: &restart { restart: unless-stopped }
x-logging: &logging
  logging:
    driver: json-file
    options: { max-size: "10m", max-file: "3" }

services:
  sub-store:
    image: xream/sub-store:latest
    container_name: sub-store
    environment:
      TZ: "${TZ:-Asia/Shanghai}"
      SUB_STORE_FRONTEND_BACKEND_PATH: "${SUB_STORE_BACKEND_PATH:-/Ku91677Gk7fHKlMQagFl}"
    ports:
      - "${SUB_STORE_PORT:-13003}:3001"
    volumes:
      - "./data:/opt/app/data"
    stdin_open: true
    tty: true
    <<: [*restart, *logging]
